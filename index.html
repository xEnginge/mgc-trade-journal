// Maps a DB row (snake_case) to the app's trade object (camelCase-ish, matches original shape)
function rowToTrade(r){
  return {
    id:r.id,
    date:r.date,
    time:r.time||'',
    side:r.side,
    contracts:r.contracts||1,
    entry:r.entry||'',
    sl:r.sl||'',
    tp:r.tp||'',
    exit:r.exit||'',
    setup:r.setup||'',
    session:r.session||'',
    pnl:r.pnl===null?null:Number(r.pnl),
    actual_r:r.actual_r===null?null:String(r.actual_r),
    planned_r:r.planned_r===null?null:String(r.planned_r),
    hidden:!!r.hidden,
    journal:r.journal||{},
    _mergedPartials:r.merged_partials||undefined,
    shareId:r.share_id||null,
  };
}

// Maps an app trade object back to DB row shape for insert/update
function tradeToRow(t){
  return {
    date:t.date,
    time:t.time||null,
    side:t.side,
    contracts:parseInt(t.contracts)||1,
    entry:t.entry?String(t.entry):null,
    sl:t.sl?String(t.sl):null,
    tp:t.tp?String(t.tp):null,
    exit:t.exit?String(t.exit):null,
    setup:t.setup||null,
    session:t.session||null,
    pnl:t.pnl===null||t.pnl===undefined?null:t.pnl,
    actual_r:t.actual_r===null||t.actual_r===undefined?null:t.actual_r,
    planned_r:t.planned_r===null||t.planned_r===undefined?null:t.planned_r,
    hidden:!!t.hidden,
    journal:t.journal||{},
    merged_partials:t._mergedPartials||null,
  };
}

  }

async function loadTradesFromDB(){
  if(!S.user)return;
  const {data,error}=await sb.from('trades').select('*').order('date',{ascending:false}).order('time',{ascending:false});
  if(error){
    S.syncError='Kon trades niet laden: '+error.message;
    S.trades=[];
    return;
  }
  S.syncError='';
  S.trades=(data||[]).map(rowToTrade);
}

// ── CALCS ──────────────────────────────────────────────────────────────────
function calcPnl(entry,exit,side,contracts){
  if(!entry||!exit||!contracts)return null;
  return Math.round((side==='Long'?1:-1)*(parseFloat(exit)-parseFloat(entry))*10*parseInt(contracts)*100)/100;
}
function calcActualR(entry,sl,exit,side){
  if(!entry||!sl||!exit)return null;
  const risk=Math.abs(parseFloat(entry)-parseFloat(sl));
  if(!risk)return null;
  return((side==='Long'?1:-1)*(parseFloat(exit)-parseFloat(entry))/risk).toFixed(2);
}
function calcPlannedR(entry,sl,tp,side){
  if(!entry||!sl||!tp)return null;
  const risk=Math.abs(parseFloat(entry)-parseFloat(sl));
  if(!risk)return null;
  return(Math.abs(parseFloat(tp)-parseFloat(entry))/risk).toFixed(2);
}
function calcJournalRR(riskAmount, pnl){
  const r=parseFloat(riskAmount);
  if(!r||r<=0||pnl===null||pnl===undefined)return null;
  return pnl/r;
}

function isInDateRange(dateStr, filter){
  if(filter==='all'||!dateStr)return true;
  const d=new Date(dateStr+'T00:00:00');
  const now=new Date();
  const todayY=now.getFullYear(),todayM=now.getMonth(),todayD=now.getDate();
  if(filter==='today'){
    return d.getFullYear()===todayY&&d.getMonth()===todayM&&d.getDate()===todayD;
  }
  if(filter==='week'){
    // Monday-based week
    const startOfWeek=new Date(now);
    const dow=(now.getDay()+6)%7; // 0=Monday
    startOfWeek.setDate(now.getDate()-dow);
    startOfWeek.setHours(0,0,0,0);
    const endOfWeek=new Date(startOfWeek);
    endOfWeek.setDate(startOfWeek.getDate()+7);
    return d>=startOfWeek&&d<endOfWeek;
  }
  if(filter==='month'){
    return d.getFullYear()===todayY&&d.getMonth()===todayM;
  }
  if(filter==='year'){
    return d.getFullYear()===todayY;
  }
  return true;
}

function filteredTrades(){
  return S.trades.filter(t=>!t.hidden&&isInDateRange(t.date,S.dateFilter));
}

function journaledTrades(){
  return filteredTrades().filter(t=>t.journal&&(t.journal.confluences||t.journal.wentWell||t.journal.wentWrong||(t.journal.j_emotionBefore&&t.journal.j_emotionBefore.length)||t.journal.inPlan));
}

function getStats(trades){
  const cl=trades.filter(t=>t.pnl!==null&&t.pnl!==undefined);
  const w=cl.filter(t=>t.pnl>0),l=cl.filter(t=>t.pnl<0);
  const tot=cl.reduce((a,t)=>a+t.pnl,0);
  const wr=cl.length?w.length/cl.length*100:0;
  const gw=w.reduce((a,t)=>a+t.pnl,0),gl=Math.abs(l.reduce((a,t)=>a+t.pnl,0));
  const pf=gl?gw/gl:null;
  const rv=cl.filter(t=>t.actual_r).map(t=>parseFloat(t.actual_r));
  const ar=rv.length?rv.reduce((a,v)=>a+v,0)/rv.length:null;
  return{closed:cl,wins:w,losses:l,total:tot,winRate:wr,pf,avgR:ar};
}

  const tf=S.tradeForm,jd=S.journalDraft;
  const tfields=['date','time','side','contracts','entry','sl','tp','exit','setup','session','result'];
  if(tfields.includes(id)){tf[id]=val;updateCalcs();}
  else if(id.startsWith('j_')){
    jd[id.slice(2)]=val;
    if(id==='j_screenshot') rerenderScreenshot();
    if(id==='j_riskAmount') rerenderRR();
  }
}

function rerenderRR(){
  const t=S.trades.find(x=>x.id===S.journalOpen);
  if(!t)return;
  const el=document.getElementById('rr_display');
  if(!el)return;
  const rrVal=calcJournalRR(S.journalDraft.riskAmount,t.pnl);
  el.textContent=rrVal!==null?fmt(rrVal)+'R':'— vul Risk $ in —';
  el.style.color=rrVal!==null?(rrVal>=0?C.green:C.red):C.muted;
}

function updateCalcs(){
  const f=S.tradeForm;
  const pnl=calcPnl(f.entry,f.exit,f.side,f.contracts);
  const pr=calcPlannedR(f.entry,f.sl,f.tp,f.side);
  const ar=calcActualR(f.entry,f.sl,f.exit,f.side);
  const set=(id,v,col)=>{const el=document.getElementById(id);if(el){el.textContent=v;if(col)el.style.color=col;}};
  set('c_pnl',pnl!==null?fmtD(pnl):'—',pnl>0?C.green:pnl<0?C.red:C.text);
  set('c_pr',pr?`1:${pr}`:'—',C.accent);
  set('c_ar',ar!==null?`${ar}R`:'—',ar>0?C.green:ar<0?C.red:C.text);
}

// ── EQUITY LINE ──────────────────────────────────────────────────────────
function renderEquity(){
  const cl=journaledTrades().filter(t=>t.pnl!==null&&t.pnl!==undefined).sort((a,b)=>a.date.localeCompare(b.date));
  if(cl.length<2)return`<div style="color:${C.muted};text-align:center;padding:36px 0;font-size:13px">Voeg meer trades toe om de equity curve te zien</div>`;
  let cum=0;const pts=[0,...cl.map(t=>{cum+=t.pnl;return cum;})];
  const min=Math.min(...pts),max=Math.max(...pts),range=max-min||1,W=600,H=110;
  const xs=pts.map((_,i)=>(i/(pts.length-1))*W),ys=pts.map(v=>H-((v-min)/range)*H);
  const d=xs.map((x,i)=>`${i===0?'M':'L'}${x},${ys[i]}`).join(' '),col=cum>=0?C.green:C.red;
  return`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:110px"><defs><linearGradient id="eq" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${col}" stop-opacity=".2"/><stop offset="100%" stop-color="${col}" stop-opacity="0"/></linearGradient></defs><path d="${d} L${W},${H} L0,${H} Z" fill="url(#eq)"/><path d="${d}" fill="none" stroke="${col}" stroke-width="2.5" stroke-linejoin="round"/></svg>`;
}

function renderTrades(){
  const visible=S.trades.filter(t=>(S.showHidden?t.hidden:!t.hidden)&&isInDateRange(t.date,S.dateFilter));
  const sorted=[...visible].sort((a,b)=>{
    const {col,dir}=S.sort;
    let av,bv;
    if(col==='date'){av=(a.date||'')+(a.time||'');bv=(b.date||'')+(b.time||'');}
    else if(col==='side'){av=a.side;bv=b.side;}
    else if(col==='pnl'){av=a.pnl!==null?a.pnl:-Infinity;bv=b.pnl!==null?b.pnl:-Infinity;}
    else if(col==='actual_r'){av=a.actual_r!==null?parseFloat(a.actual_r):-Infinity;bv=b.actual_r!==null?parseFloat(b.actual_r):-Infinity;}
    else if(col==='entry'){av=parseFloat(a.entry)||0;bv=parseFloat(b.entry)||0;}
    else if(col==='setup'){av=a.setup||'';bv=b.setup||'';}
    else if(col==='session'){av=a.session||'';bv=b.session||'';}
    else{av=(a.date||'')+(a.time||'');bv=(b.date||'')+(b.time||'');}
    if(av<bv)return -1*dir;
    if(av>bv)return 1*dir;
    return 0;

  const allIds=sorted.map(t=>t.id);
  const allSelected=allIds.length>0&&allIds.every(id=>S.selected.has(id));

        ${hiddenCount>0?`<button onclick="S.showHidden=!S.showHidden;render()" style="background:${S.showHidden?C.accent+'22':'transparent'};color:${S.showHidden?C.accent:C.sub};border:1px solid ${S.showHidden?C.accent:C.border};border-radius:7px;padding:8px 14px;cursor:pointer;font-size:12px;font-family:inherit">👁 ${S.showHidden?'Verborgen verbergen':'Verborgen tonen'} (${hiddenCount})</button>`:''}

// ── JOURNAL VIEW ──────────────────────────────────────────────────────────────
function toggleEmo(field, val){
  // field is like 'j_emotionBefore' - stores array for multi-select
  if(!Array.isArray(S.journalDraft[field])) S.journalDraft[field]=[];
  const arr=S.journalDraft[field];
  const idx=arr.indexOf(val);
  if(idx>=0) arr.splice(idx,1);
  else arr.push(val);
  rerenderEmotions();
}

function renderJournalView(){
  const t=S.trades.find(x=>x.id===S.journalOpen);
  if(!t)return`<div>Trade niet gevonden</div>`;
  const j=t.journal||{};
  const D=S.journalDraft;

  // Helper: get array value (supports old string format + new array format)
  const getArr=(key)=>{
    const v=D[key]!==undefined?D[key]:j[key];
    if(!v)return[];
    return Array.isArray(v)?v:[v];
  };

  // Multi-select emotion buttons
  const emoSel=(field)=>{
    const active=getArr(field);
    return `<div style="display:flex;flex-wrap:wrap;gap:8px">${EMOTIONS.map(e=>{
      const on=active.includes(e);
      return `<button onclick="toggleEmo('${field}','${e}')" style="background:${on?C.accent+'22':'#0d0f14'};border:1px solid ${on?C.accent:C.border};border-radius:20px;padding:6px 12px;font-size:12px;color:${on?C.accent:C.sub};cursor:pointer;font-family:inherit;transition:all .15s">${esc(e)}</button>`;
    }).join('')}</div>`;
  };

  // Single-select plan buttons
  const planSel=(val)=>`<div style="display:flex;gap:8px;flex-wrap:wrap">${PLAN_OPTIONS.map(o=>{
    const active=val===o;
    const col=o.includes('✅')?C.green:o.includes('⚠️')?'#f59e0b':C.red;
    return`<button onclick="onI('j_inPlan','${o===val?'':o}');rerenderEmotions()" style="background:${active?col+'22':'#0d0f14'};border:1px solid ${active?col:C.border};border-radius:20px;padding:6px 14px;font-size:12px;color:${active?col:C.sub};cursor:pointer;font-family:inherit;transition:all .15s">${esc(o)}</button>`;

function rerenderEmotions(){
  const D=S.journalDraft;
  const getArr=(key)=>{const v=D[key];if(!v)return[];return Array.isArray(v)?v:[v];};

  const emoSel=(field)=>EMOTIONS.map(e=>{
    const on=getArr(field).includes(e);
    return`<button onclick="toggleEmo('${field}','${e}')" style="background:${on?C.accent+'22':'#0d0f14'};border:1px solid ${on?C.accent:C.border};border-radius:20px;padding:6px 12px;font-size:12px;color:${on?C.accent:C.sub};cursor:pointer;font-family:inherit;transition:all .15s">${esc(e)}</button>`;
  }).join('');

  const planSel=(val)=>PLAN_OPTIONS.map(o=>{
    const active=val===o;
    const col=o.includes('✅')?C.green:o.includes('⚠️')?'#f59e0b':C.red;
    return`<button onclick="onI('j_inPlan','${o===val?'':o}');rerenderEmotions()" style="background:${active?col+'22':'#0d0f14'};border:1px solid ${active?col:C.border};border-radius:20px;padding:6px 14px;font-size:12px;color:${active?col:C.sub};cursor:pointer;font-family:inherit;transition:all .15s">${esc(o)}</button>`;
  }).join('');

  const eb=document.getElementById('emo_before');
  const ed=document.getElementById('emo_during');
  const ea=document.getElementById('emo_after');
  const ps=document.getElementById('plan_sel');
  if(eb)eb.innerHTML=`<div style="display:flex;flex-wrap:wrap;gap:8px">${emoSel('j_emotionBefore')}</div>`;
  if(ed)ed.innerHTML=`<div style="display:flex;flex-wrap:wrap;gap:8px">${emoSel('j_emotionDuring')}</div>`;
  if(ea)ea.innerHTML=`<div style="display:flex;flex-wrap:wrap;gap:8px">${emoSel('j_emotionAfter')}</div>`;
  if(ps)ps.innerHTML=`<div style="display:flex;gap:8px;flex-wrap:wrap">${planSel(D.inPlan||'')}</div>`;
}


// ── CALENDAR ──────────────────────────────────────────────────────────────
function renderCalendar(){
  const m=S.calMonth,y=S.calYear;
  const byDay={};
  S.trades.filter(t=>!t.hidden&&isInDateRange(t.date,S.dateFilter)).forEach(t=>{if(!t.date)return;if(!byDay[t.date])byDay[t.date]=[];byDay[t.date].push(t);});
  const first=new Date(y,m,1).getDay(),days=new Date(y,m+1,0).getDate();
  let cells='';
  for(let i=0;i<first;i++)cells+=`<div></div>`;
  for(let d=1;d<=days;d++){
    const k=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const ts=byDay[k];
    const pnl=ts?ts.reduce((a,t)=>a+(t.pnl||0),0):null;
    const bg=ts?(pnl>0?C.green+'22':pnl<0?C.red+'22':C.muted+'22'):'transparent';
    const border=`1px solid ${ts?(pnl>0?C.green+'44':pnl<0?C.red+'44':C.border):C.border}`;
    cells+=`<div style="min-height:68px;border-radius:9px;background:${bg};border:${border};padding:6px 8px">
      <div style="font-size:11px;color:${C.sub};margin-bottom:4px">${d}</div>
      ${ts?`<div style="font-size:11px;font-weight:700;color:${pnl>0?C.green:C.red}">${fmtD(pnl)}</div>
      <div style="font-size:10px;color:${C.muted}">${ts.length} trade${ts.length>1?'s':''}</div>`:''}
    </div>`;
  }
  return`
    <div style="font-size:20px;font-weight:800;margin-bottom:18px">Kalender</div>
    ${dateFilterBar()}
    ${card(`
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:20px">
        ${btnG('&#8249;','calP()')}
        <div style="font-weight:700;font-size:15px">${MONTHS[m]} ${y}</div>
        ${btnG('&#8250;','calN()')}
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:6px">
        ${['Zo','Ma','Di','Wo','Do','Vr','Za'].map(d=>`<div style="text-align:center;font-size:11px;color:${C.muted};padding-bottom:6px;font-weight:600">${d}</div>`).join('')}
        ${cells}
      </div>
    `)}`;
}
function calP(){if(S.calMonth===0){S.calMonth=11;S.calYear--;}else S.calMonth--;render();}
function calN(){if(S.calMonth===11){S.calMonth=0;S.calYear++;}else S.calMonth++;render();}

// ── REPORTS ──────────────────────────────────────────────────────────────
function renderReports(){
  const ft=filteredTrades();
  const s=getStats(ft);
  const setupMap={},sessMap={},planMap={};
  ft.filter(t=>t.pnl!==null&&t.pnl!==undefined).forEach(t=>{
    if(!setupMap[t.setup])setupMap[t.setup]={w:0,n:0,p:0};
    setupMap[t.setup].n++;if(t.pnl>0)setupMap[t.setup].w++;setupMap[t.setup].p+=t.pnl;
    if(!sessMap[t.session])sessMap[t.session]={w:0,n:0,p:0};
    sessMap[t.session].n++;if(t.pnl>0)sessMap[t.session].w++;sessMap[t.session].p+=t.pnl;
    const plan=(t.journal&&t.journal.inPlan)||'Niet ingevuld';
    if(!planMap[plan])planMap[plan]={w:0,n:0,p:0};
    planMap[plan].n++;if(t.pnl>0)planMap[plan].w++;planMap[plan].p+=t.pnl;
  });

  // emotion frequency
  const emoCount={};
  ft.forEach(t=>{
    const arr=t.journal&&Array.isArray(t.journal.j_emotionBefore)?t.journal.j_emotionBefore:(t.journal&&t.journal.emotionBefore?[t.journal.emotionBefore]:[]);
    arr.forEach(e=>{emoCount[e]=(emoCount[e]||0)+1;});
  });
  const topEmo=Object.entries(emoCount).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const totalEmoTrades=ft.length||1;

  const th=`padding:10px 14px;text-align:left;font-size:11px;color:${C.sub};text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid ${C.border}`;
  const miniTable=(map,title)=>{
    const rows=Object.entries(map).sort((a,b)=>b[1].p-a[1].p).map(([k,v])=>`
      <tr style="border-bottom:1px solid ${C.border}">
        <td style="padding:10px 14px;font-size:13px">${esc(k)}</td>
        <td style="padding:10px 14px;color:${C.sub}">${v.n}</td>
        <td style="padding:10px 14px;color:${C.green}">${v.n?Math.round(v.w/v.n*100):0}%</td>
        <td style="padding:10px 14px;font-weight:700;color:${v.p>=0?C.green:C.red}">${fmtD(v.p)}</td>
      </tr>`).join('');
    return card(`<div style="font-size:13px;font-weight:700;margin-bottom:14px;color:${C.accent}">${title}</div>
      <table><thead><tr>${['','Trades','Win%','P&L'].map(h=>`<th style="${th}">${h}</th>`).join('')}</tr></thead>
      <tbody>${rows||`<tr><td colspan="4" style="color:${C.muted};padding:14px">Geen data</td></tr>`}</tbody></table>`);
  };

  return`
    <div style="font-size:20px;font-weight:800;margin-bottom:18px">Rapporten</div>
    ${dateFilterBar()}
    <div style="display:flex;gap:14px;margin-bottom:22px;flex-wrap:wrap">
      ${statBox('Profit Factor',s.pf?fmt(s.pf):'—',s.pf>=1?C.green:C.red)}
      ${statBox('Gem. Winst',fmtD(s.wins.length?s.wins.reduce((a,t)=>a+t.pnl,0)/s.wins.length:0),C.green)}
      ${statBox('Gem. Verlies',fmtD(s.losses.length?s.losses.reduce((a,t)=>a+t.pnl,0)/s.losses.length:0),C.red)}
      ${statBox('Beste Trade',s.closed.length?fmtD(Math.max(...s.closed.map(t=>t.pnl))):'—')}
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
      ${miniTable(setupMap,'Per Setup')}
      ${miniTable(sessMap,'Per Sessie')}
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      ${miniTable(planMap,'In plan vs off plan')}
      ${card(`<div style="font-size:13px;font-weight:700;margin-bottom:14px;color:${C.accent}">Meest voorkomende emotie (voor trade)</div>
        ${topEmo.length?topEmo.map(([e,n])=>`<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
          <div style="flex:1;font-size:13px">${esc(e)}</div>
          <div style="background:${C.accent}22;border-radius:99px;height:8px;flex:2;overflow:hidden"><div style="height:100%;width:${Math.round(n/totalEmoTrades*100)}%;background:${C.accent};border-radius:99px"></div></div>
          <div style="font-size:12px;color:${C.sub};width:24px;text-align:right">${n}</div>
        </div>`).join(''):`<div style="color:${C.muted}">Voeg emoties toe bij je trades</div>`}`)}
    </div>`;
}

function toggleAuthView(){S.authView=S.authView==='login'?'signup':'login';S.authError='';render();}

async function submitAuth(){
  const email=document.getElementById('auth_email').value.trim();
  const password=document.getElementById('auth_password').value;
  if(!email||!password){S.authError='Vul email en wachtwoord in.';render();return;}
  S.authLoading=true;S.authError='';render();
  if(S.authView==='signup'){
    const {data,error}=await sb.auth.signUp({email,password});
    if(error){S.authError=error.message;S.authLoading=false;render();return;}
    if(data.user&&!data.session){
      S.authLoading=false;
      S.authError='Account aangemaakt. Check je email om te bevestigen, of vraag de beheerder om "Auto Confirm" aan te zetten.';
      render();
      return;
    }
    S.user=data.user;
  } else {
    const {data,error}=await sb.auth.signInWithPassword({email,password});
    if(error){S.authError=error.message;S.authLoading=false;render();return;}
    S.user=data.user;
  }
  await loadTradesFromDB();
  S.authLoading=false;
  render();
}

async function logout(){
  await sb.auth.signOut();
  S.user=null;
  S.trades=[];
  S.page='Dashboard';
  render();
}

// ── ACTIONS ──────────────────────────────────────────────────────────────
function nav(p){S.page=p;S.journalOpen=null;S.showTradeForm=false;S.editingTrade=null;render();}

function openTradeForm(id){
  if(id){
    const t=S.trades.find(x=>x.id===id);
    if(!t)return;
    S.editingTrade=id;
    S.tradeForm={...t};
  } else {
    S.editingTrade=null;
    S.tradeForm={date:todayStr(),time:'',side:'Long',contracts:1,entry:'',sl:'',tp:'',exit:'',setup:'OTE Long',session:'New York',result:''};
  }
  S.showTradeForm=true;
  S.journalOpen=null;
  render();
}
function closeTradeForm(){S.showTradeForm=false;S.editingTrade=null;render();}

async function saveTrade(){
  const f=S.tradeForm;
  if(!f.date||!f.entry)return alert('Datum en entry zijn verplicht.');
  const pnl=f.exit?calcPnl(f.entry,f.exit,f.side,f.contracts):null;
  const actual_r=f.exit?calcActualR(f.entry,f.sl,f.exit,f.side):null;
  const planned_r=calcPlannedR(f.entry,f.sl,f.tp,f.side);
  S.saving=true;render();
  if(S.editingTrade){
    const i=S.trades.findIndex(x=>x.id===S.editingTrade);
    if(i>=0){
      const updated={...S.trades[i],...f,pnl,actual_r,planned_r};
      const saved=await dbUpdateTrade(S.editingTrade,updated);
      if(saved)S.trades[i]=saved;
    }
  } else {
    const draft={...f,id:uid(),pnl,actual_r,planned_r,journal:{}};
    const saved=await dbInsertTrade(draft);
    if(saved)S.trades.unshift(saved);
  }
  S.saving=false;
  S.showTradeForm=false;
  S.editingTrade=null;
  render();
}

async function delTrade(id){
  if(confirm('Trade verwijderen?')){
    const ok=await dbDeleteTrade(id);
    if(ok)S.trades=S.trades.filter(t=>t.id!==id);
    render();
  }
}

function openJournal(id){
  const t=S.trades.find(x=>x.id===id);
  if(!t)return;
  S.journalOpen=id;
  const j=t.journal||{};
  // Convert old single-string emotion values to arrays
  const toArr=(v)=>!v?[]:(Array.isArray(v)?v:[v]);
  S.journalDraft={
    ...j,
    j_emotionBefore:toArr(j.j_emotionBefore||j.emotionBefore),
    j_emotionDuring:toArr(j.j_emotionDuring||j.emotionDuring),
    j_emotionAfter:toArr(j.j_emotionAfter||j.emotionAfter),
  };
  S.showTradeForm=false;
  render();
}
function closeJournal(){S.journalOpen=null;S.journalDraft={};render();}

async function saveJournal(){
  const i=S.trades.findIndex(x=>x.id===S.journalOpen);
  if(i<0)return;
  const t=S.trades[i];
  const realizedRR=calcJournalRR(S.journalDraft.riskAmount,t.pnl);
  const updatedJournal={...S.journalDraft,realizedRR};
  S.saving=true;render();
  const updated={...t,journal:updatedJournal};
  const saved=await dbUpdateTrade(t.id,updated);
  if(saved)S.trades[i]=saved;
  S.saving=false;
  S.journalOpen=null;
  S.journalDraft={};
  render();
}

async function shareTrade(tradeId){
  const i=S.trades.findIndex(x=>x.id===tradeId);
  if(i<0)return;
  S.saving=true;render();
  const shareId=generateShareId();
  const saved=await dbSetShareId(tradeId,shareId);
  if(saved)S.trades[i]=saved;
  S.saving=false;
  render();
  if(saved){
    const shareUrl=window.location.origin+window.location.pathname+'?share='+saved.shareId;
    copyShareLink(shareUrl);
  }
}

function copyShareLink(url){
  navigator.clipboard.writeText(url).then(()=>{
    const box=document.getElementById('share_link_box');
    if(box){
      const old=box.style.background;
      box.style.background=C.green+'22';
      setTimeout(()=>{box.style.background=old;},600);
    }
    showToast('Link gekopieerd naar klembord');
  }).catch(()=>{
    prompt('Kopieer deze link handmatig:',url);
  });
}

function showToast(msg){
  let t=document.getElementById('toast');
  if(!t){
    t=document.createElement('div');
    t.id='toast';
    t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#181c26;border:1px solid #f0b429;color:#f0b429;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:700;z-index:999;transition:opacity .3s';
    document.body.appendChild(t);
  }
  t.textContent=msg;
  t.style.opacity='1';
  clearTimeout(window._toastTimer);
  window._toastTimer=setTimeout(()=>{t.style.opacity='0';},2000);
}

// ── TRANSLATION (shared trade view only) ──────────────────────────────────
async function translateText(text){
  // MyMemory free translation API — no key required, splits long text into chunks of ~480 chars
  const chunks=[];
  let remaining=text;
  while(remaining.length>0){
    chunks.push(remaining.slice(0,480));
    remaining=remaining.slice(480);
  }
  const translatedParts=[];
  for(const chunk of chunks){
    const url='https://api.mymemory.translated.net/get?q='+encodeURIComponent(chunk)+'&langpair=nl|en';
    const res=await fetch(url);
    const data=await res.json();
    translatedParts.push(data&&data.responseData&&data.responseData.translatedText?data.responseData.translatedText:chunk);
  }
  return translatedParts.join('');
}

async function translateField(field){
  const t=S.sharedTrade;
  if(!t||!t.journal||!t.journal[field])return;
  const text=t.journal[field];
  const btnId=field==='confluences'?'translate_btn':'translate_btn_'+field;
  const boxId=field==='confluences'?'translation_box':'translation_box_'+field;
  const btn=document.getElementById(btnId);
  const box=document.getElementById(boxId);
  if(!box)return;

  // Toggle off if already showing
  if(box.dataset.shown==='1'){
    box.innerHTML='';
    box.dataset.shown='0';
    if(btn)btn.textContent='🌐 Translate'+(field==='confluences'?' to English':'');
    return;
  }

  if(btn){btn.textContent='Translating...';btn.disabled=true;}
  box.innerHTML=`<div style="display:flex;align-items:center;gap:8px;margin-top:12px;color:${C.muted};font-size:12px"><div class="spinner" style="width:16px;height:16px;border-width:2px"></div>Translating...</div>`;

  try{
    const translated=await translateText(text);
    box.innerHTML=`<div style="margin-top:14px;padding-top:14px;border-top:1px solid ${C.border}">
      <div style="font-size:11px;color:${C.accent};text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">🌐 English Translation</div>
      <div style="color:${C.text};line-height:1.7;font-size:13px;white-space:pre-wrap;font-style:italic">${esc(translated)}</div>
    </div>`;
    box.dataset.shown='1';
    if(btn){btn.textContent='Hide translation';btn.disabled=false;}
  }catch(err){
    box.innerHTML=`<div style="margin-top:12px;color:${C.red};font-size:12px">⚠ Translation failed. Please try again.</div>`;
    if(btn){btn.textContent='🌐 Translate'+(field==='confluences'?' to English':'');btn.disabled=false;}
  }
}

// CSV
function openImport(){S.showImport=true;S.importStatus='idle';render();}
function closeImport(){S.showImport=false;render();}
function handleCSV(input){
  const file=input.files[0];if(!file)return;
  S.importStatus='parsing';render();
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const res=parseCSV(e.target.result);
      const mk=t=>t.date+'_'+t.side+'_'+String(t.entry)+'_'+String(t.exit)+'_'+String(parseInt(t.contracts)||1);
      // Build a set of all known keys, including original partial fills stored in merged trades
      const exKeys=new Set();
      S.trades.forEach(t=>{
        exKeys.add(mk(t));
        // Also add keys of original partials that were merged into this trade
        if(t._mergedPartials){
          t._mergedPartials.forEach(function(p){exKeys.add(mk(p));});
        }
      });
      // Filter: skip any trade whose key exists, or whose entry+exit+date combo matches a known partial
      const fresh=res.filter(function(t){
        if(exKeys.has(mk(t)))return false;
        // Extra check: same date+side+entry+exit regardless of contracts rounding
        const dupMatch=S.trades.some(function(st){
          if(!st._mergedPartials)return false;
          return st._mergedPartials.some(function(p){
            return p.date===t.date && p.side===t.side &&
                   String(p.entry)===String(t.entry) &&
                   String(p.exit)===String(t.exit);
          });
        });
        return !dupMatch;
      });
      S.importDups=res.length-fresh.length;
      S.importParsed=fresh;
      S.importStatus='preview';
    }catch(err){
      S.importError=err.message;
      S.importStatus='error';
    }
    render();
  };
  reader.readAsText(file);
}
async function doImport(){
  S.importStatus='importing';render();
  const toInsert=S.importParsed.map(t=>({...t,journal:{}}));
  const saved=await dbBulkInsert(toInsert);
  S.trades=[...saved,...S.trades];
  S.showImport=false;
  S.importStatus='idle';
  render();
}

function parseCSV(text){
  const lines=text.trim().split('\n').map(l=>l.trim()).filter(Boolean);
  if(lines.length<2)throw new Error('CSV lijkt leeg of ongeldig.');
  const hdrs=lines[0].split(',').map(h=>h.replace(/^"|"$/g,'').toLowerCase());
  const col=(row,...names)=>{for(const n of names){const i=hdrs.findIndex(h=>h.includes(n.toLowerCase()));if(i>=0)return(row[i]||'').replace(/^"|"$/g,'').trim();}return'';};
  const orders=[];
  for(let i=1;i<lines.length;i++){
    const row=lines[i].split(',').map(c=>c.replace(/^"|"$/g,'').trim());
    if(!col(row,'status').toLowerCase().includes('filled'))continue;
    const bs=col(row,'b/s','side','action');
    const price=parseFloat(col(row,'avgprice','avg price','avg fill price','price'));
    const qty=parseInt(col(row,'filledqty','filled qty','qty'));
    const fillTime=col(row,'fill time','timestamp','date');
    const contract=col(row,'contract','product');
    if(!bs||!price||!qty)continue;
    orders.push({bs:bs.toUpperCase(),contract,price,qty,fillTime});
  }
  if(!orders.length)throw new Error('Geen gevulde orders gevonden. Exporteer via de Orders tab, niet Performance.');
  const byC={};
  orders.forEach(o=>{const s=o.contract||'MGC';if(!byC[s])byC[s]=[];byC[s].push(o);});
  const trades=[];
  for(const[sym,ords]of Object.entries(byC)){
    ords.sort((a,b)=>new Date(a.fillTime)-new Date(b.fillTime));
    let oP=null,oQ=0,oS=null,oT=null;
    for(const o of ords){
      const buy=o.bs==='B'||o.bs==='BUY';
      if(oQ===0){oP=o.price;oQ=o.qty;oS=buy?'Long':'Short';oT=o.fillTime;}
      else{
        const cQ=Math.min(oQ,o.qty),dir=oS==='Long'?1:-1;
        const pnl=Math.round(dir*(o.price-oP)*10*cQ*100)/100;
        let date=todayStr();
        try{const d=new Date(oT||o.fillTime);date=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}catch(e){}
        let session='Other';
        try{const h=new Date(oT).getUTCHours();if(h>=2&&h<8)session='London';else if(h>=7&&h<9)session='London/NY Overlap';else if(h>=13&&h<20)session='New York';else if(h>=23||h<2)session='Asian';}catch(e){}
        const actual_r=calcActualR(oP.toFixed(2),'',o.price.toFixed(2),oS);
        let tradeTime='';
        try{const d=new Date(oT||o.fillTime);tradeTime=String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}catch(e){}
        trades.push({id:uid(),date,time:tradeTime,side:oS,contracts:cQ,entry:oP.toFixed(2),sl:'',tp:'',exit:o.price.toFixed(2),setup:'OTE '+oS,session,pnl,actual_r,planned_r:null,journal:{}});
        oQ-=cQ;if(oQ===0){oP=null;oS=null;oT=null;}
      }
    }
  }
  return trades;
}

// Backup
function dlBackup(){
  const d=JSON.stringify({version:2,exportedAt:new Date().toISOString(),trades:S.trades},null,2);
  const a=document.createElement('a');
  a.href='data:application/json;charset=utf-8,'+encodeURIComponent(d);
  a.download=`mgc-journal-backup-${todayStr()}.json`;
  a.click();
}
function restoreBackup(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=async(e)=>{
    try{
      const p=JSON.parse(e.target.result);
      const r=p.trades||p;
      if(!Array.isArray(r))throw new Error('Ongeldig');
      if(!confirm(`${r.length} trades importeren naar je account? Dit voegt ze toe aan je bestaande trades (geen overschrijving).`)){
        input.value='';return;
      }
      S.saving=true;render();
      // Strip old local ids so Supabase generates fresh ones, avoiding collisions
      const toInsert=r.map(t=>{const {id,...rest}=t;return rest;});
      const saved=await dbBulkInsert(toInsert);
      S.trades=[...saved,...S.trades];
      S.saving=false;
      render();
    }catch(e){alert('Ongeldig backup bestand.');S.saving=false;render();}
    input.value='';
  };
  reader.readAsText(file);
}

// Quote rotation
setInterval(()=>{const n=currentQuotes().length;S.quoteIdx=(S.quoteIdx+1)%n;render();},30000);

function toggleSel(id){
  if(S.selected.has(id))S.selected.delete(id);
  else S.selected.add(id);
  render();
}
function toggleAll(){
  const visible=S.trades.filter(t=>S.showHidden?t.hidden:!t.hidden).map(t=>t.id);
  const allSel=visible.every(id=>S.selected.has(id));
  if(allSel)visible.forEach(id=>S.selected.delete(id));
  else visible.forEach(id=>S.selected.add(id));
  render();
}
async function hideSelected(){
  if(!S.selected.size)return;
  const action=S.showHidden?'zichtbaar maken':'verbergen';
  if(!confirm(`${S.selected.size} trades ${action}?`))return;
  const ids=[...S.selected];
  const newHidden=!S.showHidden;
  S.saving=true;render();
  for(const id of ids){
    const t=S.trades.find(x=>x.id===id);
    if(t){
      const updated={...t,hidden:newHidden};
      const saved=await dbUpdateTrade(id,updated);
      if(saved){const idx=S.trades.findIndex(x=>x.id===id);if(idx>=0)S.trades[idx]=saved;}
    }
  }
  S.selected=new Set();
  S.saving=false;
  render();
}
async function deleteSelected(){
  if(!S.selected.size)return;
  if(!confirm(`${S.selected.size} trades definitief verwijderen?`))return;
  const ids=[...S.selected];
  S.saving=true;render();
  const ok=await dbDeleteTrades(ids);
  if(ok)S.trades=S.trades.filter(t=>!S.selected.has(t.id));
  S.selected=new Set();
  S.saving=false;
  render();
}
async function mergeSelected(){
  const ids=[...S.selected];
  if(ids.length<2)return alert('Selecteer minimaal 2 trades om samen te voegen.');

  const trades=S.trades.filter(t=>ids.includes(t.id));

  // Validate: all must have same side and entry
  const sides=[...new Set(trades.map(t=>t.side))];
  const entries=[...new Set(trades.map(t=>t.entry))];
  if(sides.length>1){
    return alert('Kan niet samenvoegen: trades hebben verschillende richtingen (Long/Short).');
  }
  if(entries.length>1){
    const ok=confirm(`Let op: de trades hebben verschillende entry prijzen (${entries.join(', ')}). Toch samenvoegen met gewogen gemiddelde?`);
    if(!ok)return;
  }

  // Calculate totals
  const totalContracts=trades.reduce((a,t)=>a+(parseInt(t.contracts)||1),0);

  // Weighted average exit price
  const totalExitValue=trades.reduce((a,t)=>{
    const c=parseInt(t.contracts)||1;
    const x=parseFloat(t.exit)||0;
    return a+(x*c);
  },0);
  const avgExit=totalExitValue/totalContracts;

  // Weighted average entry price
  const totalEntryValue=trades.reduce((a,t)=>{
    const c=parseInt(t.contracts)||1;
    const e=parseFloat(t.entry)||0;
    return a+(e*c);
  },0);
  const avgEntry=totalEntryValue/totalContracts;

  // Total P&L (sum of all partials)
  const totalPnl=trades.reduce((a,t)=>a+(t.pnl||0),0);

  // Actual R based on merged entry/exit and first SL found
  const sl=trades.find(t=>t.sl)?.sl||'';
  const actual_r=sl?calcActualR(avgEntry.toFixed(2),sl,avgExit.toFixed(2),trades[0].side):null;

  // Use earliest date/time
  const sorted=[...trades].sort((a,b)=>{
    const da=(a.date||'')+(a.time||'');
    const db=(b.date||'')+(b.time||'');
    return da.localeCompare(db);
  });
  const first=sorted[0];

  // Merge journals: combine notes
  const journalParts=trades.filter(t=>t.journal).map((t,i)=>{
    const j=t.journal;
    const parts=[];
    if(j.confluences)parts.push(j.confluences);
    if(j.wentWell)parts.push('Goed: '+j.wentWell);
    if(j.wentWrong)parts.push('Fout: '+j.wentWrong);
    return parts.length?`[Partial ${i+1}] `+parts.join(' | '):'';
  }).filter(Boolean);

  // Build merged trade
  const merged={
    id:uid(),
    date:first.date,
    time:first.time||'',
    side:first.side,
    contracts:totalContracts,
    entry:avgEntry.toFixed(2),
    sl,
    tp:trades.find(t=>t.tp)?.tp||'',
    exit:avgExit.toFixed(2),
    setup:first.setup,
    session:first.session,
    pnl:Math.round(totalPnl*100)/100,
    actual_r,
    journal:{
      ...first.journal||{},
      confluences:(first.journal&&first.journal.confluences?first.journal.confluences+' ':'')+'[Samengevoegd uit '+trades.length+' partials: '+trades.map(function(t){return (t.contracts||1)+'c @ '+t.exit;}).join(', ')+']',
      wentWell:journalParts.length?journalParts.join(' | '):(first.journal&&first.journal.wentWell?first.journal.wentWell:''),
    },
    _merged:true,
    _mergedFrom:ids,
    _mergedPartials:trades.map(function(t){return {date:t.date,side:t.side,entry:String(t.entry),exit:String(t.exit),contracts:t.contracts};}),
  };








  const tradeLines=trades.map(function(t){return '- '+t.date+(t.time?' '+t.time:'')+' | '+(t.contracts||1)+'c @ entry '+t.entry+' exit '+t.exit+' | '+fmtD(t.pnl);}).join('\n');
  const preview='Samenvoegen van '+trades.length+' trades:\n\n'+tradeLines+'\n\nResultaat:\n  Contracts: '+totalContracts+'c\n  Gem. entry: '+avgEntry.toFixed(2)+'\n  Gem. exit: '+avgExit.toFixed(2)+'\n  Totaal P&L: '+fmtD(totalPnl)+(actual_r?'\n  Actual R: '+actual_r+'R':'')+'\n\nDe originele '+trades.length+' trades worden verwijderd.';





















  if(!confirm(preview))return;

  S.saving=true;render();

  // Insert the merged trade first, then delete the originals
  const savedMerged=await dbInsertTrade(merged);
  if(!savedMerged){S.saving=false;render();return;}

  const delOk=await dbDeleteTrades(ids);

  const firstIdx=Math.min(...ids.map(id=>S.trades.findIndex(t=>t.id===id)));
  S.trades=S.trades.filter(t=>!ids.includes(t.id));
  S.trades.splice(firstIdx,0,savedMerged);
  S.selected=new Set();
  S.saving=false;
  render();
}

function sortBy(col){
  if(S.sort.col===col){S.sort.dir*=-1;}
  else{S.sort.col=col;S.sort.dir=-1;}
  render();
}

function toggleTheme(){
  S.theme=S.theme==='dark'?'light':'dark';
  localStorage.setItem('mgc_theme',S.theme);
  applyTheme(S.theme);
  render();
}

  if(event==='SIGNED_OUT'){
